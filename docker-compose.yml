version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quran_academy_postgres
    environment:
      POSTGRES_DB: quran_academy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quran_academy_network

  redis:
    image: redis:7-alpine
    container_name: quran_academy_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quran_academy_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  quran_academy_network:
    driver: bridge
